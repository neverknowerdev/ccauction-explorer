name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: yarn install

    - name: Install PostgreSQL Client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Run Migrations
      run: |
        chmod +x migrations/run-migrations.sh
        ./migrations/run-migrations.sh up
      env:
        DB_CONNECTION_STRING: postgres://user:password@localhost:5432/test_db

    # No need for explicit 'yarn build' here since playwright.config.ts handles it,
    # but keeping it doesn't hurt. However, removing it saves time/redundancy
    # if we trust the config. But to be safe and fail fast, let's keep it but without start.
    - name: Build Next.js App
      run: yarn build
      env:
        DB_CONNECTION_STRING: postgres://user:password@localhost:5432/test_db
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: BMockKey_ForTestingOnly_1234567890
        VAPID_PRIVATE_KEY: MockPrivateKey_ForTestingOnly
        NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: ${{ secrets.NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID }}

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      env:
        DB_CONNECTION_STRING: postgres://user:password@localhost:5432/test_db
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: BMockKey_ForTestingOnly_1234567890
        VAPID_PRIVATE_KEY: MockPrivateKey_ForTestingOnly
        NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: ${{ secrets.NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID }}
        DYNAMIC_TEST_ACCOUNT_OTP: ${{ secrets.DYNAMIC_TEST_ACCOUNT_OTP }}
        CI: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
